<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; line-height: 1.6; }
    a { color: #0366d6; }
    code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; }
    pre { background: #f6f8fa; padding: 1rem; overflow-x: auto; border-radius: 6px; }
    blockquote { border-left: 4px solid #e1e4e8; margin: 0; padding-left: 1rem; color: #6a737d; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #e1e4e8; padding: 8px; text-align: left; }
    th { background: #f6f8fa; }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
