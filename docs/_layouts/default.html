<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    :root { --primary: #0969da; --bg: #ffffff; --text: #24292f; --muted: #57606a; --border: #d0d7de; --code-bg: #f6f8fa; }
    @media (prefers-color-scheme: dark) { :root { --bg: #0d1117; --text: #c9d1d9; --muted: #8b949e; --border: #30363d; --code-bg: #161b22; } }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 0; }
    nav { background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 1rem; display: flex; justify-content: space-between; align-items: center; height: 60px; position: sticky; top: 0; z-index: 100; }
    nav .logo { font-weight: 700; color: var(--text); text-decoration: none; font-size: 1.1rem; }
    .burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
    .burger span { width: 24px; height: 2px; background: var(--text); transition: all 0.3s; }
    .menu { display: flex; gap: 0; list-style: none; margin: 0; padding: 0; }
    .menu a { display: block; padding: 0.5rem 1rem; color: var(--text); text-decoration: none; border-radius: 6px; font-size: 0.9rem; }
    .menu a:hover { background: var(--code-bg); }
    .menu a.active { background: var(--primary); color: white; }
    .overlay { display: none; position: fixed; top: 60px; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 99; padding: 1rem; overflow-y: auto; }
    .overlay.open { display: block; }
    .overlay ul { list-style: none; margin: 0; padding: 0; }
    .overlay li { border-bottom: 1px solid var(--border); }
    .overlay a { display: block; padding: 1rem; color: var(--text); text-decoration: none; }
    .overlay a.active { color: var(--primary); font-weight: 600; }
    main { max-width: 800px; margin: 0 auto; padding: 2rem; }
    .page-header { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .page-header h1 { margin: 0; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: var(--code-bg); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
    pre { background: var(--code-bg); padding: 1rem; overflow-x: auto; border-radius: 6px; border: 1px solid var(--border); }
    pre code { background: none; padding: 0; }
    blockquote { border-left: 4px solid var(--primary); margin: 1.5rem 0; padding: 0.5rem 1rem; background: var(--code-bg); color: var(--muted); }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
    th { background: var(--code-bg); }
    .guide-cards { display: grid; gap: 1rem; margin: 1.5rem 0; }
    .guide-cards a { display: block; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s; }
    .guide-cards a:hover { border-color: var(--primary); text-decoration: none; transform: translateY(-2px); }
    @media (max-width: 768px) { .burger { display: flex; } .menu { display: none; } }
  </style>
</head>
<body>
  <nav>
    <a href="{{ site.baseurl }}/" class="logo">{{ site.title }}</a>
    <ul class="menu">
      <li><a href="{{ site.baseurl }}/">Home</a></li>
      <li><a href="{{ site.baseurl }}/guides/seo">SEO Guide</a></li>
      <li><a href="{{ site.baseurl }}/guides/performance">Performance</a></li>
      <li><a href="{{ site.baseurl }}/guides/routing">Routing</a></li>
    </ul>
    <button class="burger" onclick="toggleMenu()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div id="menu" class="overlay">
    <ul>
      <li><a href="{{ site.baseurl }}/">Home</a></li>
      <li><a href="{{ site.baseurl }}/guides/seo">SEO Guide</a></li>
      <li><a href="{{ site.baseurl }}/guides/performance">Performance</a></li>
      <li><a href="{{ site.baseurl }}/guides/routing">Routing</a></li>
    </ul>
  </div>
  <main>
    <div class="page-header">
      <h1>{{ page.title }}</h1>
    </div>
    {{ content }}
  </main>
  <script>
    function toggleMenu() { document.getElementById('menu').classList.toggle('open'); }
    document.querySelectorAll('.menu a, .overlay a').forEach(link => {
      if (link.href === window.location.href) link.classList.add('active');
    });
  </script>
</body>
</html>
